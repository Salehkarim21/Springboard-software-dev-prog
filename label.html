<title>Label Demo</title>
<body>
    <h1>Labels!</h1>
    <h2>Register</h2>
    <form>
        <!-- label using for/id -->
        <label for="email"> Enter your email: </label>
        Enter a valid email address
        <input type="email" placeholder="Email" name="email" required id="email">
    </label>
        <br>
         <!-- label using nesting -->
        <label> 
            Enter Password:
             <input type="password" placeholder="password" name="password" required>
        </label><br>
        <label>
<input type="checkbox" name="tos-agree" required> I agree to terms and services.
        </label><br>
        <p> Select Shirt size</p>
        <label>
            <input type="radio" name="shirt-size" value="Small"> S
        </label><br>
        <label>
            <input type="radio" name="shirt-size" value="Medium"> Mm
        </label><br>
        <label>
            <input type="radio" name="shirt-size" value="Large"> L
        </label><br>
        
        <button type="submit">Submit</button>
    </form>
    <input type="file">
<!-- to upload a file we need a file input, this kind of input will not let us upload the file -->
 
<!-- to upload a file we need to use this special attribute "enctype" this is what we do when we want to send a big size file data-->


<form method="post" enctype="multipart/form-data">
    <label> this will not actually work but go ahead and pick a file!</label>

    <input type="file" name="file-upload">
    <button type="submit">Upload File</button>
</body>
